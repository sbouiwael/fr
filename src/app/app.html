<div class="app-container">
  <!-- Navbar -->
  <nav class="app-nav">
    <div class="nav-container">
      <a routerLink="/" class="nav-brand">
        <img src="/logo-biat.webp" alt="BIAT Innovation & Technology" class="nav-logo-img">
        <span>PPM</span>
      </a>

      <button class="mobile-menu-toggle" (click)="menuOpen = !menuOpen">
        {{ menuOpen ? '✕' : '☰' }}
      </button>

      <ul class="nav-links" [class.active]="menuOpen">
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link" (click)="menuOpen = false">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Home
        </a></li>
        <li><a routerLink="/projects" routerLinkActive="active" class="nav-link" (click)="menuOpen = false">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          Projects
        </a></li>
        <li><a routerLink="/portefeuilles" routerLinkActive="active" class="nav-link" (click)="menuOpen = false">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          Portfolios
        </a></li>
        <li><a routerLink="/tasks" routerLinkActive="active" class="nav-link" (click)="menuOpen = false">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Tasks
        </a></li>
        <li><a routerLink="/users" routerLinkActive="active" class="nav-link" (click)="menuOpen = false">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Users
        </a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="app-main">
    <router-outlet />
  </main>

  <!-- Footer -->
  <footer class="app-footer">
    <div class="footer-content">
      <p class="footer-text">BIAT Innovation & Technology &mdash; Project Portfolio Management</p>
      <p class="footer-text">&copy; 2026 BIAT. All rights reserved.</p>
    </div>
  </footer>
</div>
