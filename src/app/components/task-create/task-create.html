<div class="container-sm">
  <div class="page-header">
    <h1 class="page-title">Create Task</h1>
  </div>

  <div class="card">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Task Name *</label>
        <input type="text" formControlName="name" placeholder="Enter task name" />
        <div class="form-error" *ngIf="form.get('name')?.touched && form.get('name')?.invalid">
          Task Name is required.
        </div>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea formControlName="description" placeholder="Describe your task..."></textarea>
        <div class="form-error" *ngIf="form.get('description')?.touched && form.get('description')?.invalid">
          Description must be at least 5 characters.
        </div>
      </div>

      <div class="grid grid-cols-2">
        <div class="form-group">
          <label>Duration (Days) *</label>
          <input type="number" formControlName="durationDays" placeholder="0" />
          <div class="form-error" *ngIf="form.get('durationDays')?.touched && form.get('durationDays')?.invalid">
            Duration is required and must be positive.
          </div>
        </div>

        <div class="form-group">
          <label>Progress (%) *</label>
          <input type="number" formControlName="progress" placeholder="0-100" />
          <div class="form-error" *ngIf="form.get('progress')?.touched && form.get('progress')?.invalid">
            Progress must be between 0 and 100.
          </div>
        </div>
      </div>

      <div class="grid grid-cols-2">
        <div class="form-group">
          <label>Start Date *</label>
          <input type="date" formControlName="startDate" />
          <div class="form-error" *ngIf="form.get('startDate')?.touched && form.get('startDate')?.invalid">
            Start Date is required.
          </div>
        </div>

        <div class="form-group">
          <label>End Date *</label>
          <input type="date" formControlName="endDate" />
          <div class="form-error" *ngIf="form.get('endDate')?.touched && form.get('endDate')?.invalid">
            End Date is required.
          </div>
        </div>
      </div>

      <div class="grid grid-cols-2">
        <div class="form-group">
          <label>Status</label>
          <select formControlName="status">
            <option value="NOT_STARTED">Not Started</option>
            <option value="IN_PROGRESS">In Progress</option>
            <option value="DONE">Done</option>
            <option value="BLOCKED">Blocked</option>
          </select>
        </div>

        <div class="form-group">
          <label>Project ID *</label>
          <input type="number" formControlName="projectId" placeholder="Enter project ID" />
          <div class="form-error" *ngIf="form.get('projectId')?.touched && form.get('projectId')?.invalid">
            Project is required.
          </div>
        </div>
      </div>

      <div class="alert alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="loading">
          {{ loading ? 'Creating...' : 'Create Task' }}
        </button>
        <a routerLink="/tasks" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
